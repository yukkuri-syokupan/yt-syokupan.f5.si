<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabako</title>
    <style>
        :root {
            --bg-color: #ffffff; /* 完全な白 */
            --text-color: #000000; /* 完全な黒 */
            --sub-color: #777777;
            --border-color: #e5e5e5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { 
            font-size: 32px; 
            font-weight: 700;
            margin: 0 0 40px 0;
            letter-spacing: 0.05em;
        }

        /* ソリッドな黒ボタン */
        button { 
            background: var(--text-color); 
            color: var(--bg-color); 
            border: 1px solid var(--text-color); 
            padding: 14px 28px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: 600;
            cursor: pointer; 
            transition: opacity 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        button:hover { 
            opacity: 0.8;
        }

        button.outline {
            background: transparent;
            color: var(--sub-color);
            border: 1px solid var(--border-color);
            width: auto;
            padding: 8px 16px;
            font-size: 12px;
        }

        button.outline:hover {
            border-color: var(--text-color);
            color: var(--text-color);
            opacity: 1;
        }
        
        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            resize: none;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            margin-bottom: 15px;
            background: var(--bg-color);
            color: var(--text-color);
        }

        textarea:focus { 
            border-color: var(--text-color); 
        }

        .notice {
            font-size: 12px;
            color: var(--sub-color);
            margin-top: 30px;
            line-height: 1.5;
        }
        
        .status { 
            margin-top: 20px; 
            font-size: 13px; 
            color: var(--text-color); 
            min-height: 1.5em;
        }

        .hidden { display: none !important; }
        
        /* マイページ用：お題リスト */
        .user-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--text-color);
        }

        .user-name { 
            font-size: 18px; 
            font-weight: 700;
        }

        .inbox-title {
            text-align: left;
            font-size: 14px;
            font-weight: 700;
            margin: 40px 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .odai-item { 
            text-align: left;
            padding: 20px 0; 
            font-size: 15px;
            line-height: 1.6;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scrabako</h1>
        
    <!-- 1. 未ログイン画面（トップページ） -->
    <div id="logged-out-zone">
        <button id="login-btn">Scratchでログイン</button>
        <p class="notice">ログインすると、あなた専用のお題箱URLが作成されます。</p>
    </div>

    <!-- 2. ログイン完了画面（マイページ） -->
    <div id="logged-in-zone" class="hidden">
        <div class="user-header">
            <span class="user-name">@<span id="username-display"></span></span>
            <button id="logout-btn" class="outline">ログアウト</button>
        </div>
        
        <!-- お題送信フォーム -->
        <textarea id="odai-input" placeholder="匿名メッセージを入力（テスト送信できます）"></textarea>
        <button id="send-btn">メッセージを送信</button>

        <!-- 受信一覧 -->
        <div id="odai-list-section" class="hidden">
            <div class="inbox-title">Inbox</div>
            <div id="odai-list">
                <!-- ここにお題が追加されます -->
            </div>
        </div>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const MY_SITE_URL = 'https://yt-syokupan.f5.si/scratch.html'; 

    const base64Url = btoa(encodeURIComponent(MY_SITE_URL).replace(/%([0-9A-F]{2})/g, (match, p1) => {
        return String.fromCharCode('0x' + p1);
    }));

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const sendBtn = document.getElementById('send-btn');
    const odaiInput = document.getElementById('odai-input');
    const odaiListDiv = document.getElementById('odai-list');
    const odaiListSection = document.getElementById('odai-list-section');
    const statusDiv = document.getElementById('status');
    const loggedOutZone = document.getElementById('logged-out-zone');
    const loggedInZone = document.getElementById('logged-in-zone');
    const usernameDisplay = document.getElementById('username-display');

    // ログイン処理
    loginBtn.addEventListener('click', () => {
        statusDiv.innerText = '接続中...';
        const appName = encodeURIComponent("Scrabako");
        const targetUrl = `https://auth.itinerary.eu.org/auth/?redirect=${base64Url}&name=${appName}`;
        window.location.href = targetUrl;
    });

    // 認証チェック
    window.addEventListener('DOMContentLoaded', async () => {
        const savedUser = localStorage.getItem('scratch_username');
        if (savedUser) {
            showLoggedIn(savedUser);
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const privateCode = urlParams.get('privateCode');

        if (privateCode) {
            statusDiv.innerText = 'アカウント検証中...';
            try {
                const verifyUrl = `https://auth-api.itinerary.eu.org/auth/verifyToken/${privateCode}?method=comment&redirect=${encodeURIComponent(base64Url)}`;
                const response = await fetch(verifyUrl);
                const data = await response.json();

                if (data.valid && data.username) {
                    localStorage.setItem('scratch_username', data.username);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showLoggedIn(data.username);
                } else {
                    statusDiv.innerText = '認証に失敗しました。';
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerText = '通信エラーが発生しました。';
            }
        }
    });

    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('scratch_username');
        window.location.href = window.location.pathname;
    });

    // メッセージ送信
    sendBtn.addEventListener('click', () => {
        const text = odaiInput.value.trim();
        if (!text) return;

        let savedOdai = JSON.parse(localStorage.getItem('scrabako_odai') || '[]');
        savedOdai.unshift(text); 
        localStorage.setItem('scrabako_odai', JSON.stringify(savedOdai));

        odaiInput.value = '';
        statusDiv.innerText = '送信しました';
        setTimeout(() => { statusDiv.innerText = ''; }, 2000);
        
        renderOdai();
    });

    function showLoggedIn(username) {
        loggedOutZone.classList.add('hidden');
        loggedInZone.classList.remove('hidden');
        usernameDisplay.innerText = username;
        statusDiv.innerText = '';
        renderOdai();
    }

    function renderOdai() {
        odaiListDiv.innerHTML = '';
        const savedOdai = JSON.parse(localStorage.getItem('scrabako_odai') || '[]');
        
        if (savedOdai.length === 0) {
            odaiListSection.classList.add('hidden');
            return;
        }

        odaiListSection.classList.remove('hidden');
        savedOdai.forEach(odai => {
            const div = document.createElement('div');
            div.className = 'odai-item';
            div.innerText = odai;
            odaiListDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
