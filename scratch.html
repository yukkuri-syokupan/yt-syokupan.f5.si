<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabako</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sub-color: #777777;
            --border-color: #e5e5e5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { 
            font-size: 32px; 
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: 0.05em;
        }

        .page-owner {
            font-size: 14px;
            color: var(--sub-color);
            margin-bottom: 40px;
        }

        button { 
            background: var(--text-color); 
            color: var(--bg-color); 
            border: 1px solid var(--text-color); 
            padding: 14px 28px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: 600;
            cursor: pointer; 
            transition: opacity 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        button:hover { opacity: 0.8; }

        button.outline {
            background: transparent;
            color: var(--sub-color);
            border: 1px solid var(--border-color);
            width: auto;
            padding: 8px 16px;
            font-size: 12px;
        }

        button.outline:hover {
            border-color: var(--text-color);
            color: var(--text-color);
            opacity: 1;
        }
        
        /* ニックネーム入力欄のスタイル */
        .name-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .name-input:focus { border-color: var(--text-color); }

        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            resize: none;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            margin-bottom: 15px;
            background: var(--bg-color);
            color: var(--text-color);
        }

        textarea:focus { border-color: var(--text-color); }

        .notice {
            font-size: 12px;
            color: var(--sub-color);
            margin-top: 30px;
            line-height: 1.5;
        }
        
        .status { 
            margin-top: 20px; 
            font-size: 13px; 
            color: var(--text-color); 
            min-height: 1.5em;
        }

        .hidden { display: none !important; }
        
        .user-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--text-color);
        }

        .user-name { font-size: 18px; font-weight: 700; }
        .inbox-title { text-align: left; font-size: 14px; font-weight: 700; margin: 40px 0 15px 0; text-transform: uppercase; }
        
        /* 受信アイテム（差出人名が見えるように調整） */
        .odai-item { 
            text-align: left; 
            padding: 20px 0; 
            font-size: 15px; 
            line-height: 1.6; 
            border-bottom: 1px solid var(--border-color); 
        }
        .odai-sender {
            font-size: 11px;
            color: var(--sub-color);
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .box-link-share {
            background: #fafafa;
            padding: 15px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            margin-top: 20px;
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scrabako</h1>
    <div id="page-owner-display" class="page-owner hidden"></div>
        
    <div id="logged-out-zone" class="hidden">
        <button id="login-btn">Scratchでログインしてお題箱を作る</button>
        <p class="notice">ログインすると、あなた専用のお題箱URLが作成されます。</p>
    </div>

    <div id="send-zone" class="hidden">
        <input type="text" id="sender-name-input" class="name-input" placeholder="ニックネーム（空欄なら匿名さん）" maxlength="20">
        <textarea id="odai-input" placeholder="メッセージを入力..."></textarea>
        <button id="send-btn">メッセージを送信</button>
        <p class="notice">このメッセージは相手に届きます。<br><a href="?" style="color: inherit;">自分のお題箱を作る</a></p>
    </div>

    <div id="logged-in-zone" class="hidden">
        <div class="user-header">
            <span class="user-name">@<span id="username-display"></span> の管理画面</span>
            <button id="logout-btn" class="outline">ログアウト</button>
        </div>
        
        <div class="box-link-share">
            <strong>🔗 あなたのお題箱URL:</strong><br>
            <span id="my-box-url" style="color: #555;"></span>
        </div>

        <div id="odai-list-section" class="hidden">
            <div class="inbox-title">Inbox (受信箱)</div>
            <div id="odai-list"></div>
        </div>
    </div>

    <div id="status" class="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, get, child, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtEnMVm4Zwgo60dnwC_PtU-JmOvBheH9g",
        authDomain: "scrabako.firebaseapp.com",
        projectId: "scrabako",
        storageBucket: "scrabako.firebasestorage.app",
        messagingSenderId: "733907569048",
        appId: "1:733907569048:web:94b756e8dd8ea572dec3ed",
        databaseURL: "https://scrabako-default-rtdb.firebaseio.com/" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const MY_SITE_URL = 'https://yt-syokupan.f5.si/scratch.html'; 

    const urlParams = new URLSearchParams(window.location.search);
    const targetBoxId = urlParams.get('id'); 
    const privateCode = urlParams.get('privateCode'); 

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const sendBtn = document.getElementById('send-btn');
    const odaiInput = document.getElementById('odai-input');
    const senderNameInput = document.getElementById('sender-name-input');
    const odaiListDiv = document.getElementById('odai-list');
    const odaiListSection = document.getElementById('odai-list-section');
    const statusDiv = document.getElementById('status');
    
    const loggedOutZone = document.getElementById('logged-out-zone');
    const sendZone = document.getElementById('send-zone');
    const loggedInZone = document.getElementById('logged-in-zone');
    const usernameDisplay = document.getElementById('username-display');
    const pageOwnerDisplay = document.getElementById('page-owner-display');
    const myBoxUrlSpan = document.getElementById('my-box-url');

    const redirectUrlWithParam = privateCode ? MY_SITE_URL : window.location.href;
    const base64Url = btoa(encodeURIComponent(redirectUrlWithParam).replace(/%([0-9A-F]{2})/g, (match, p1) => {
        return String.fromCharCode('0x' + p1);
    }));

    window.addEventListener('DOMContentLoaded', async () => {
        const savedUser = localStorage.getItem('scratch_username');

        if (privateCode) {
            statusDiv.innerText = 'アカウント検証中...';
            try {
                const verifyUrl = `https://auth-api.itinerary.eu.org/auth/verifyToken/${privateCode}?method=comment&redirect=${encodeURIComponent(base64Url)}`;
                const response = await fetch(verifyUrl);
                const data = await response.json();

                if (data.valid && data.username) {
                    localStorage.setItem('scratch_username', data.username);
                    window.location.href = `?id=${data.username}`;
                } else {
                    statusDiv.innerText = '認証に失敗しました。';
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerText = '通信エラーが発生しました。';
            }
            return;
        }

        if (targetBoxId) {
            if (savedUser && savedUser.toLowerCase() === targetBoxId.toLowerCase()) {
                showLoggedIn(savedUser);
            } else {
                showSendPage(targetBoxId);
            }
        } else {
            if (savedUser) {
                window.location.href = `?id=${savedUser}`;
            } else {
                loggedOutZone.classList.remove('hidden');
            }
        }
    });

    loginBtn.addEventListener('click', () => {
        statusDiv.innerText = '接続中...';
        const appName = encodeURIComponent("Scrabako");
        const targetUrl = `https://auth.itinerary.eu.org/auth/?redirect=${base64Url}&name=${appName}`;
        window.location.href = targetUrl;
    });

    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('scratch_username');
        window.location.href = '?';
    });

    // 【送信処理】ニックネーム情報も含めて保存
    sendBtn.addEventListener('click', async () => {
        const text = odaiInput.value.trim();
        if (!text) return;

        // 名前が空欄なら「匿名さん」にする
        const senderName = senderNameInput.value.trim() || "匿名さん";

        try {
            const dbRef = ref(db, `odais/${targetBoxId.toLowerCase()}`);
            await push(dbRef, {
                sender: senderName, // ニックネームを保存
                content: text,
                createdAt: serverTimestamp()
            });

            odaiInput.value = '';
            senderNameInput.value = '';
            statusDiv.innerText = `@${targetBoxId} さんにお題を送信しました`;
            setTimeout(() => { statusDiv.innerText = ''; }, 3000);
        } catch (e) {
            console.error(e);
            statusDiv.innerText = '送信に失敗しました。';
        }
    });

    function showLoggedIn(username) {
        loggedInZone.classList.remove('hidden');
        usernameDisplay.innerText = username;
        myBoxUrlSpan.innerText = `${MY_SITE_URL}?id=${username}`;
        renderOdai(username);
    }

    function showSendPage(ownerName) {
        pageOwnerDisplay.innerText = `@${ownerName} のお題箱`;
        pageOwnerDisplay.classList.remove('hidden');
        sendZone.classList.remove('hidden');
    }

    // 【取得処理】ニックネームを表示できるように描画
    async function renderOdai(username) {
        odaiListDiv.innerHTML = '';
        const dbRef = ref(db);
        
        try {
            const snapshot = await get(child(dbRef, `odais/${username.toLowerCase()}`));
            if (snapshot.exists()) {
                odaiListSection.classList.remove('hidden');
                const data = snapshot.val();
                
                const items = Object.values(data).reverse();
                
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'odai-item';
                    
                    // ニックネームを表示する要素（過去のデータでsenderが無い場合は匿名さんとして扱う）
                    const senderDiv = document.createElement('div');
                    senderDiv.className = 'odai-sender';
                    senderDiv.innerText = `From: ${item.sender || '匿名さん'}`;
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.innerText = item.content;
                    
                    div.appendChild(senderDiv);
                    div.appendChild(contentDiv);
                    odaiListDiv.appendChild(div);
                });
            } else {
                odaiListSection.classList.add('hidden');
            }
        } catch (e) {
            console.error(e);
        }
    }
</script>
</body>
</html>
